name: govulncheck

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 2" # Tuesdays at 09:00 UTC

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          go-version-file: go.mod
          cache: false
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
